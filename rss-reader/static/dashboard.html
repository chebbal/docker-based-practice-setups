<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSS Reader · Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <h1><span class="brand">◆</span> RSS Reader</h1>
  <nav>
    <a href="/">Reader</a>
    <a href="/dashboard" class="active">Dashboard</a>
  </nav>
</header>

<div class="dash">
  <h2>Add a feed</h2>
  <form id="addForm" class="add-row">
    <input type="url" id="urlInput" placeholder="https://example.com/feed.xml" required autofocus>
    <button type="submit" class="primary" id="addBtn">Add</button>
  </form>
  <p class="hint">Paste an RSS or Atom feed URL. The feed is fetched and validated immediately.</p>

  <h2>Your feeds (<span id="count">0</span>)</h2>
  <div id="feedCards"></div>
</div>

<div id="toast" class="toast"></div>
<script src="/static/dashboard.js"></script>
</body>
</html>
